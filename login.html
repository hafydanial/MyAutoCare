<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — MyAutoCare</title>
<link rel="stylesheet" href="app.css"/>
<style>
body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1.5rem; }
.auth-wrap { width: 100%; max-width: 440px; }
.auth-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 2.5rem; justify-content: center; }
.auth-logo .logo-mark { width: 42px; height: 42px; border-radius: 11px; font-size: 20px; }
.auth-logo .logo-text { font-family: var(--fd); font-weight: 800; font-size: 1.3rem; color: var(--white); }
.auth-logo .logo-text em { color: var(--accent); font-style: normal; }
.auth-card { background: var(--g700); border: 1px solid var(--border); border-radius: var(--radius); padding: 2.5rem; }
.auth-title { font-family: var(--fd); font-weight: 800; font-size: 1.6rem; color: var(--white); margin-bottom: .4rem; }
.auth-subtitle { font-size: .9rem; color: var(--muted); margin-bottom: 2rem; }
.auth-link { color: var(--accent); text-decoration: none; font-weight: 600; }
.auth-link:hover { text-decoration: underline; }
.demo-box { background: var(--accent-dim); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: .9rem 1.1rem; margin-bottom: 1.5rem; font-size: .8rem; color: var(--muted); }
.demo-box strong { color: var(--accent); }
.divider { display: flex; align-items: center; gap: .75rem; margin: 1.25rem 0; color: var(--muted); font-size: .8rem; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
</style>
</head>
<body>
<div id="toast-container"></div>
<div class="auth-wrap">
  <div class="auth-logo">
    <div class="logo-mark">M</div>
    <div class="logo-text">My<em>Auto</em>Care</div>
  </div>
  <div class="auth-card">
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Log in to manage your vehicles</p>

    <div class="demo-box">
      🔑 Demo account — <strong>hafy@demo.com</strong> / <strong>demo1234</strong>
    </div>

    <div class="form-group">
      <label class="form-label">Email address</label>
      <input type="email" id="email" class="form-control" placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-control" placeholder="••••••••"/>
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;" id="loginBtn">
      Sign In
    </button>
    <div class="divider">or</div>
    <p style="text-align:center;font-size:.875rem;color:var(--muted)">
      Don't have an account? <a href="register.html" class="auth-link">Create one free</a>
    </p>
  </div>
  <p style="text-align:center;margin-top:1.5rem;font-size:.78rem;color:var(--muted)">
    <a href="index.html" class="auth-link">← Back to homepage</a>
  </p>
</div>
<script src="app-core.js"></script>
<script>
MAC.auth.redirectIfLoggedIn();
document.getElementById('loginBtn').addEventListener('click', () => {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) { MAC.utils.toast('Please fill in all fields', 'error'); return; }
  const user = MAC.users.find(email);
  if (!user || user.password !== password) { MAC.utils.toast('Invalid email or password', 'error'); return; }
  MAC.auth.login(user);
  MAC.utils.toast('Welcome back, ' + user.name.split(' ')[0] + '!');
  setTimeout(() => window.location.href = 'dashboard.html', 700);
});
document.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('loginBtn').click(); });
</script>
</body>
</html>
