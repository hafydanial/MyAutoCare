<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vehicle History — MyAutoCare</title>
<link rel="stylesheet" href="app.css"/>
<style>
body { padding: 2rem 1rem; max-width: 900px; margin: 0 auto; }
.pub-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
.verified-badge { background: var(--accent); color: var(--g900); font-family: var(--fd); font-weight: 800; padding: .5rem 1.25rem; border-radius: 99px; font-size: .85rem; }
.pub-report { background: white; color: #111; border-radius: var(--radius); padding: 2.5rem; }
.pub-report h2 { color: #030c04; border-bottom: 3px solid #35e857; padding-bottom: .5rem; margin-bottom: 1rem; font-family: 'Outfit', sans-serif; }
.rp-table { width: 100%; border-collapse: collapse; font-size: .875rem; }
.rp-table th { background: #0b1a0d; color: #9ffcad; padding: .65rem .9rem; text-align: left; font-size: .78rem; text-transform: uppercase; letter-spacing: .04em; }
.rp-table td { padding: .65rem .9rem; border-bottom: 1px solid #e5e7eb; }
.rp-table tr:nth-child(even) td { background: #f9fafb; }
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; margin-bottom: 1.5rem; font-size: .875rem; }
.info-grid span { color: #6b7280; }
</style>
</head>
<body>
<div id="toast-container"></div>
<div class="pub-header">
  <div style="display:flex;align-items:center;gap:.75rem">
    <div class="logo-mark" style="width:40px;height:40px;border-radius:10px;font-size:19px">M</div>
    <div style="font-family:var(--fd);font-weight:800;font-size:1.2rem;color:var(--white)">My<em style="color:var(--accent);font-style:normal">Auto</em>Care</div>
  </div>
  <div class="verified-badge">✓ Verified History</div>
</div>

<div id="main-content"></div>

<div style="text-align:center;margin-top:2rem;font-size:.8rem;color:var(--muted)">
  This report is read-only and was generated by the vehicle owner via MyAutoCare.<br/>
  <a href="index.html" style="color:var(--accent)">Visit MyAutoCare →</a>
</div>

<script src="app-core.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const token = params.get('token');

function render() {
  const content = document.getElementById('main-content');

  if (!token) {
    content.innerHTML = `<div class="empty-state"><div class="empty-icon">🔒</div><div class="empty-title">Invalid Link</div><div class="empty-desc">This report link is invalid or has expired.</div></div>`;
    return;
  }

  const tokenMap = JSON.parse(localStorage.getItem('mac_tokens') || '{}');
  const tokenData = tokenMap[token];

  if (!tokenData) {
    content.innerHTML = `<div class="empty-state"><div class="empty-icon">🔒</div><div class="empty-title">Link Not Found</div><div class="empty-desc">This report link is invalid or has been revoked by the owner.</div></div>`;
    return;
  }

  if (new Date(tokenData.expiresAt) < new Date()) {
    content.innerHTML = `<div class="empty-state"><div class="empty-icon">⏱️</div><div class="empty-title">Link Expired</div><div class="empty-desc">This share link expired on ${MAC.utils.formatDate(tokenData.expiresAt)}. Please ask the owner for a new link.</div></div>`;
    return;
  }

  const v = MAC.vehicles.get(tokenData.vehicleId);
  if (!v) {
    content.innerHTML = `<div class="empty-state"><div class="empty-icon">❓</div><div class="empty-title">Vehicle Not Found</div></div>`;
    return;
  }

  const logs = MAC.logs.forVehicle(v.id).sort((a,b) => new Date(b.serviceDate) - new Date(a.serviceDate));
  const totalCost = logs.reduce((s,l) => s + parseFloat(l.cost||0), 0);

  content.innerHTML = `
    <div class="pub-report">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem">
        <div>
          <div style="font-family:'Outfit',sans-serif;font-weight:900;font-size:1.3rem;color:#030c04">MyAutoCare</div>
          <div style="font-size:.75rem;color:#6b7280">Official Vehicle History Report</div>
        </div>
        <div style="text-align:right;font-size:.75rem;color:#6b7280">
          Generated: ${new Date().toLocaleDateString('en-MY')}<br/>
          Expires: ${MAC.utils.formatDate(tokenData.expiresAt)}
        </div>
      </div>

      <h2>Vehicle Information</h2>
      <div class="info-grid">
        <div><span>Brand & Model:</span> <strong>${MAC.utils.escapeHtml(v.brand+' '+v.model)}</strong></div>
        <div><span>Plate Number:</span> <strong style="color:#1a6b2a;font-size:1rem">${MAC.utils.escapeHtml(v.plate)}</strong></div>
        <div><span>Year:</span> ${v.year || '—'}</div>
        <div><span>Colour:</span> ${v.colour || '—'}</div>
        <div><span>Fuel Type:</span> ${v.fuelType || '—'}</div>
        <div><span>Recorded Mileage:</span> ${v.mileage ? parseInt(v.mileage).toLocaleString() + ' km' : '—'}</div>
        <div><span>Vehicle Type:</span> ${v.type === 'car' ? '🚗 Car' : '🏍️ Motorcycle'}</div>
        <div><span>Total Records:</span> ${logs.length} service entries</div>
      </div>

      <h2>Service History</h2>
      ${logs.length ? `
        <table class="rp-table">
          <thead>
            <tr><th>Date</th><th>Service Type</th><th>Mileage</th><th>Workshop</th><th>Cost (RM)</th><th>Notes</th></tr>
          </thead>
          <tbody>
            ${logs.map(l => `<tr>
              <td><strong>${MAC.utils.formatDate(l.serviceDate)}</strong></td>
              <td>${MAC.utils.escapeHtml(l.serviceType)}</td>
              <td>${l.mileageAtService ? parseInt(l.mileageAtService).toLocaleString() + ' km' : '—'}</td>
              <td>${MAC.utils.escapeHtml(l.workshopName)}</td>
              <td><strong>RM ${parseFloat(l.cost).toFixed(2)}</strong></td>
              <td style="color:#6b7280;font-size:.8rem">${MAC.utils.escapeHtml(l.notes) || '—'}</td>
            </tr>`).join('')}
            <tr style="background:#f0fdf2;font-weight:700">
              <td colspan="4" style="text-align:right">Total Maintenance Cost:</td>
              <td style="color:#1a6b2a">RM ${totalCost.toFixed(2)}</td>
              <td></td>
            </tr>
          </tbody>
        </table>
        <div style="margin-top:1.25rem;padding:.75rem 1rem;background:#f0fdf2;border-radius:8px;border-left:3px solid #35e857;font-size:.85rem">
          <strong>🛡️ Buyer's Note:</strong> This history has been digitally recorded and verified by the vehicle owner using MyAutoCare. All records are self-reported by the owner. We recommend requesting workshop receipts for high-cost services.
        </div>
      ` : `<p style="color:#6b7280">No service records have been logged for this vehicle.</p>`}

      <div style="margin-top:2rem;padding-top:1rem;border-top:1px solid #e5e7eb;font-size:.72rem;color:#9ca3af;display:flex;justify-content:space-between">
        <span>Report Token: ${token}</span>
        <span>MyAutoCare · CSP600 FYP · UiTM CDCS240</span>
      </div>
    </div>
  `;
}

render();
</script>
</body>
</html>
