<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reports & Share — MyAutoCare</title>
<link rel="stylesheet" href="app.css"/>
<style>
.report-preview { background: white; color: #111; border-radius: var(--r); padding: 2rem; font-family: 'Urbanist', sans-serif; }
.report-preview h2 { color: #030c04; border-bottom: 3px solid #35e857; padding-bottom: .5rem; margin-bottom: 1rem; }
.rp-table { width: 100%; border-collapse: collapse; font-size: .8rem; margin-top: .75rem; }
.rp-table th { background: #0f1a0e; color: #d3f7e1; padding: .5rem; text-align: left; }
.rp-table td { padding: .5rem; border-bottom: 1px solid #e5e7eb; }
.rp-table tr:nth-child(even) td { background: #f9fafb; }
.share-link-box { background: var(--stone); border: 1px solid var(--line); border-radius: var(--r-sm); padding: .75rem 1rem; display: flex; align-items: center; gap: .75rem; }
.share-link-box input { flex: 1; background: none; border: none; color: var(--accent); font-size: .85rem; outline: none; }
</style>
</head>
<body>
<div id="toast-container"></div>
<div class="app-layout"></div>
<script src="app-core.js"></script>
<script src="layout.js"></script>
<script>
buildLayout('reports', 'Reports & Share');

const user = MAC.auth.getUser();
const vehicles = MAC.vehicles.forUser(user.id);
let selectedVehicleId = vehicles.length ? vehicles[0].id : null;
let shareLinks = JSON.parse(localStorage.getItem('mac_sharelinks') || '{}');

function saveShareLinks() { localStorage.setItem('mac_sharelinks', JSON.stringify(shareLinks)); }

function generateToken() {
  return Math.random().toString(36).substring(2, 10) + Math.random().toString(36).substring(2, 10);
}

function renderPage() {
  const v = selectedVehicleId ? MAC.vehicles.get(selectedVehicleId) : null;
  const logs = selectedVehicleId ? MAC.logs.forVehicle(selectedVehicleId).sort((a,b) => new Date(b.serviceDate) - new Date(a.serviceDate)) : [];
  const totalCost = logs.reduce((s, l) => s + parseFloat(l.cost || 0), 0);
  const link = selectedVehicleId ? shareLinks[selectedVehicleId] : null;
  const shareUrl = link ? `${window.location.origin}${window.location.pathname.replace('reports.html', '')}public-report.html?token=${link.token}` : '';

  document.getElementById('page-content').innerHTML = `
    <div class="page-header">
      <div>
        <h1 class="page-title">Reports & Share</h1>
        <p class="page-subtitle">Generate maintenance reports and share vehicle history with buyers</p>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 2fr;gap:1.25rem;align-items:start" class="reports-grid">
      <!-- Left panel -->
      <div style="display:flex;flex-direction:column;gap:1rem">
        <div class="card">
          <div class="card-title" style="margin-bottom:1rem">Select Vehicle</div>
          ${vehicles.length ? vehicles.map(veh => `
            <div onclick="selectedVehicleId=${veh.id};renderPage()" style="display:flex;align-items:center;gap:.75rem;padding:.75rem;border-radius:var(--r-sm);cursor:pointer;border:1px solid ${veh.id===selectedVehicleId?'var(--accent)':'var(--line)'};background:${veh.id===selectedVehicleId?'var(--accent-dim)':'transparent'};margin-bottom:.5rem;transition:all .2s">
              <div style="font-size:1.3rem">${veh.type==='car'?'🚗':'🏍️'}</div>
              <div>
                <div style="font-weight:600;color:var(--heading);font-size:.9rem">${MAC.utils.escapeHtml(veh.brand+' '+veh.model)}</div>
                <div style="font-size:.75rem;color:var(--accent)">${MAC.utils.escapeHtml(veh.plate)}</div>
              </div>
            </div>
          `).join('') : `<div style="color:var(--muted);font-size:.875rem">No vehicles yet. <a href="vehicles.html" style="color:var(--accent)">Add one</a></div>`}
        </div>

        ${v ? `
        <div class="card">
          <div class="card-title" style="margin-bottom:1rem">🔗 Share with Buyer</div>
          ${link ? `
            <div class="share-link-box" style="margin-bottom:.75rem">
              <input type="text" value="${shareUrl}" readonly id="shareLinkInput"/>
              <button class="btn btn-outline btn-sm" onclick="copyLink()">Copy</button>
            </div>
            <div style="font-size:.75rem;color:var(--muted);margin-bottom:.75rem">Expires: ${MAC.utils.formatDate(link.expiresAt)}</div>
            <button class="btn btn-danger btn-sm" style="width:100%;justify-content:center" onclick="revokeLink(${v.id})">Revoke Link</button>
          ` : `
            <p style="font-size:.85rem;color:var(--muted);margin-bottom:1rem">Generate a secure, shareable link for potential buyers to view this vehicle's full maintenance history without logging in.</p>
            <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="generateLink(${v.id})">Generate Share Link</button>
          `}
        </div>

        <button class="btn btn-outline" style="width:100%;justify-content:center" onclick="printReport()">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="15" height="15"><path stroke-linecap="round" d="M6.72 13.829c-.24.03-.48.062-.72.096m.72-.096a42.415 42.415 0 0 1 10.56 0m-10.56 0L6.34 18m10.94-4.171c.24.03.48.062.72.096m-.72-.096L17.66 18m0 0 .229 2.523a1.125 1.125 0 0 1-1.12 1.227H7.231c-.662 0-1.18-.568-1.12-1.227L6.34 18m11.318 0h1.091A2.25 2.25 0 0 0 21 15.75V9.456c0-1.081-.768-2.015-1.837-2.175a48.055 48.055 0 0 0-1.913-.247M6.34 18H5.25A2.25 2.25 0 0 1 3 15.75V9.456c0-1.081.768-2.015 1.837-2.175a48.041 48.041 0 0 1 1.913-.247m10.5 0a48.536 48.536 0 0 0-10.5 0m10.5 0V3.375c0-.621-.504-1.125-1.125-1.125h-8.25c-.621 0-1.125.504-1.125 1.125v3.659M18 10.5h.008v.008H18V10.5Zm-3 0h.008v.008H15V10.5Z"/></svg>
          Print / Save PDF
        </button>
        ` : ''}
      </div>

      <!-- Right panel: Report preview -->
      <div class="card" id="reportPreview">
        ${!v ? `
          <div class="empty-state">
            <div class="empty-icon">📄</div>
            <div class="empty-title">Select a vehicle</div>
            <div class="empty-desc">Choose a vehicle on the left to preview its report</div>
          </div>
        ` : `
          <div class="card-header">
            <div class="card-title">Report Preview</div>
            <span style="font-size:.75rem;color:var(--muted)">Generated ${new Date().toLocaleDateString('en-MY')}</span>
          </div>
          <div class="report-preview" id="printable">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem">
              <div>
                <div style="font-family:'Outfit',sans-serif;font-weight:900;font-size:1.4rem;color:#030c04">MyAutoCare</div>
                <div style="font-size:.75rem;color:#6b7280">Smart Vehicle Maintenance System</div>
              </div>
              <div style="background:#35e857;color:#030c04;font-weight:800;padding:.3rem .8rem;border-radius:6px;font-size:.8rem">✓ VERIFIED</div>
            </div>

            <h2 style="font-family:'Outfit',sans-serif">Vehicle Maintenance Report</h2>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:1.25rem;font-size:.85rem">
              <div><span style="color:#6b7280">Vehicle:</span> <strong>${MAC.utils.escapeHtml(v.brand+' '+v.model)}</strong></div>
              <div><span style="color:#6b7280">Plate:</span> <strong style="color:#1a6b2a">${MAC.utils.escapeHtml(v.plate)}</strong></div>
              <div><span style="color:#6b7280">Year:</span> ${v.year || '—'}</div>
              <div><span style="color:#6b7280">Colour:</span> ${v.colour || '—'}</div>
              <div><span style="color:#6b7280">Fuel:</span> ${v.fuelType || '—'}</div>
              <div><span style="color:#6b7280">Mileage:</span> ${v.mileage ? parseInt(v.mileage).toLocaleString() + ' km' : '—'}</div>
            </div>

            <h3 style="font-family:'Outfit',sans-serif;margin-bottom:.5rem;color:#030c04">Service History (${logs.length} records)</h3>
            ${logs.length ? `
              <table class="rp-table">
                <thead><tr><th>Date</th><th>Service</th><th>Mileage</th><th>Workshop</th><th>Cost (RM)</th></tr></thead>
                <tbody>
                  ${logs.map(l => `<tr>
                    <td>${MAC.utils.formatDate(l.serviceDate)}</td>
                    <td>${MAC.utils.escapeHtml(l.serviceType)}</td>
                    <td>${l.mileageAtService ? parseInt(l.mileageAtService).toLocaleString() + ' km' : '—'}</td>
                    <td>${MAC.utils.escapeHtml(l.workshopName)}</td>
                    <td><strong>${parseFloat(l.cost).toFixed(2)}</strong></td>
                  </tr>`).join('')}
                  <tr style="background:var(--accent-pale)">
                    <td colspan="4"><strong>Total Maintenance Cost</strong></td>
                    <td><strong style="color:#1a6b2a">RM ${totalCost.toFixed(2)}</strong></td>
                  </tr>
                </tbody>
              </table>
            ` : '<p style="color:#6b7280;font-size:.85rem">No service records found for this vehicle.</p>'}

            <div style="margin-top:1.5rem;padding-top:1rem;border-top:1px solid #e5e7eb;font-size:.72rem;color:#9ca3af;display:flex;justify-content:space-between">
              <span>Report ID: MAC-${selectedVehicleId}-${Date.now().toString(36).toUpperCase()}</span>
              <span>Generated: ${new Date().toLocaleString('en-MY')}</span>
            </div>
          </div>
        `}
      </div>
    </div>
  `;

  if (window.innerWidth <= 700) {
    document.querySelector('.reports-grid').style.gridTemplateColumns = '1fr';
  }
}

function generateLink(vehicleId) {
  const token = generateToken();
  const expires = new Date(); expires.setDate(expires.getDate() + 30);
  shareLinks[vehicleId] = { token, expiresAt: expires.toISOString(), vehicleId };
  // Store token → vehicleId mapping for public view
  const tokenMap = JSON.parse(localStorage.getItem('mac_tokens') || '{}');
  tokenMap[token] = { vehicleId, expiresAt: expires.toISOString() };
  localStorage.setItem('mac_tokens', JSON.stringify(tokenMap));
  saveShareLinks();
  MAC.utils.toast('Share link generated! Valid for 30 days.');
  renderPage();
}

function revokeLink(vehicleId) {
  const link = shareLinks[vehicleId];
  if (link) {
    const tokenMap = JSON.parse(localStorage.getItem('mac_tokens') || '{}');
    delete tokenMap[link.token];
    localStorage.setItem('mac_tokens', JSON.stringify(tokenMap));
  }
  delete shareLinks[vehicleId];
  saveShareLinks();
  MAC.utils.toast('Share link revoked');
  renderPage();
}

function copyLink() {
  const input = document.getElementById('shareLinkInput');
  navigator.clipboard.writeText(input.value).then(() => MAC.utils.toast('Link copied to clipboard!'));
}

function printReport() {
  const printContent = document.getElementById('printable').outerHTML;
  const win = window.open('', '_blank');
  win.document.write(`<!DOCTYPE html><html><head><title>MyAutoCare Report</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Urbanist:wght@400;600&display=swap" rel="stylesheet"/>
    <style>body{font-family:'Urbanist',sans-serif;padding:2rem;max-width:800px;margin:0 auto}.rp-table{width:100%;border-collapse:collapse}.rp-table th{background:#0b1a0d;color:#9ffcad;padding:.5rem;text-align:left}.rp-table td{padding:.5rem;border-bottom:1px solid #e5e7eb}</style>
  </head><body>${printContent}<script>window.print();<\/script></body></html>`);
  win.document.close();
}

renderPage();
</script>
</body>
</html>
