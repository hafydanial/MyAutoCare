<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard — MyAutoCare</title>
<link rel="stylesheet" href="app.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
<div id="toast-container"></div>
<div class="app-layout"></div>
<script src="app-core.js"></script>
<script src="layout.js"></script>
<script>
buildLayout('dashboard', 'Dashboard');

// ── EmailJS Reminder Alerts ────────────────────────────
// Configure these with your EmailJS account (same keys as register.html)
const EJS_PUBLIC_KEY  = 'YOUR_PUBLIC_KEY';
const EJS_SERVICE_ID  = 'YOUR_SERVICE_ID';
const EJS_REMINDER_TEMPLATE = 'YOUR_REMINDER_TEMPLATE_ID'; // Create a 2nd template for reminders

if (EJS_PUBLIC_KEY !== 'YOUR_PUBLIC_KEY') {
  emailjs.init({ publicKey: EJS_PUBLIC_KEY });
}

// Check and send reminder emails (once per day per reminder)
async function checkAndSendReminderEmails() {
  if (EJS_PUBLIC_KEY === 'YOUR_PUBLIC_KEY') return; // skip if not configured
  const user = MAC.auth.getUser();
  const reminders = MAC.reminders.all().filter(r => r.status !== 'done');
  const sentKey = 'mac_reminder_sent_' + user.id;
  const sentToday = JSON.parse(localStorage.getItem(sentKey) || '{}');
  const today = new Date().toDateString();

  for (const r of reminders) {
    const status = MAC.reminders.getStatus(r.dueDate);
    // Only alert for overdue or due within notifyDays
    if (status === 'upcoming') continue;
    const sentId = r.id + '_' + today;
    if (sentToday[sentId]) continue; // already sent today

    const vehicle = MAC.vehicles.forUser(user.id).find(v => v.id === r.vehicleId);
    const vehicleName = vehicle ? vehicle.brand + ' ' + vehicle.model + ' (' + vehicle.plate + ')' : 'your vehicle';

    try {
      await emailjs.send(EJS_SERVICE_ID, EJS_REMINDER_TEMPLATE, {
        to_name:      user.name,
        to_email:     user.email,
        reminder_type: r.type,
        vehicle_name: vehicleName,
        due_date:     MAC.utils.formatDate(r.dueDate),
        status_label: status === 'overdue' ? '🔴 OVERDUE' : '🟡 Due Soon',
        notes:        r.notes || 'No additional notes',
      });
      sentToday[sentId] = true;
      localStorage.setItem(sentKey, JSON.stringify(sentToday));
    } catch(e) {
      console.warn('Reminder email failed:', e);
    }
  }
}

setTimeout(checkAndSendReminderEmails, 2000); // small delay after page load

const user = MAC.auth.getUser();
const vehicles = MAC.vehicles.forUser(user.id);
const logs = MAC.logs.forUser(user.id);
const reminders = MAC.reminders.forUser(user.id);
const totalSpent = logs.reduce((s, l) => s + parseFloat(l.cost || 0), 0);
const overdueReminders = reminders.filter(r => MAC.reminders.getStatus(r.dueDate) === 'overdue');
const recentLogs = [...logs].sort((a, b) => new Date(b.serviceDate) - new Date(a.serviceDate)).slice(0, 5);

// Monthly costs for last 6 months
const months = [];
const monthlyCosts = [];
for (let i = 5; i >= 0; i--) {
  const d = new Date();
  d.setMonth(d.getMonth() - i);
  const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  const label = d.toLocaleDateString('en-MY', { month: 'short', year: '2-digit' });
  months.push(label);
  const monthLogs = logs.filter(l => l.serviceDate && l.serviceDate.startsWith(key));
  monthlyCosts.push(monthLogs.reduce((s, l) => s + parseFloat(l.cost || 0), 0));
}

// Service type breakdown
const typeCounts = {};
logs.forEach(l => { typeCounts[l.serviceType] = (typeCounts[l.serviceType] || 0) + 1; });
const typeLabels = Object.keys(typeCounts);
const typeData = Object.values(typeCounts);

const grn = '#1db954';
const chartDefaults = { responsive: true, maintainAspectRatio: false,
  plugins: { legend: { display: false }, tooltip: { backgroundColor: '#0f1a0e', titleColor: '#d3f7e1', bodyColor: '#8c9e8b', borderColor: '#1db954', borderWidth: 1 } },
  scales: { x: { grid: { color: 'rgba(53,232,87,.05)' }, ticks: { color: '#8c9e8b' } }, y: { grid: { color: 'rgba(53,232,87,.05)' }, ticks: { color: '#8c9e8b', callback: v => 'RM' + v } } }
};

document.getElementById('page-content').innerHTML = `
  <div class="page-header">
    <div>
      <h1 class="page-title">Good ${new Date().getHours() < 12 ? 'morning' : new Date().getHours() < 18 ? 'afternoon' : 'evening'}, ${MAC.utils.escapeHtml(user.name.split(' ')[0])} 👋</h1>
      <p class="page-subtitle">Here's your vehicle health overview</p>
    </div>
    <a href="vehicles.html" class="btn btn-primary">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="15" height="15"><path stroke-linecap="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
      Add Vehicle
    </a>
  </div>

  <div class="stat-grid">
    <div class="stat-card">
      <div class="stat-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" d="M9 17a2 2 0 1 1-4 0 2 2 0 0 1 4 0zm10 0a2 2 0 1 1-4 0 2 2 0 0 1 4 0z"/><path stroke-linecap="round" d="M1 17h2a2 2 0 0 1 2-2h.5L7 9h10l1.5 6H19a2 2 0 0 1 2 2h2"/></svg></div>
      <div><div class="stat-val">${vehicles.length}</div><div class="stat-label">Vehicles Registered</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 0 0 2.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 0 0-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75 2.25 2.25 0 0 0-.1-.664m-5.8 0A2.251 2.251 0 0 1 13.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25Z"/></svg></div>
      <div><div class="stat-val">${logs.length}</div><div class="stat-label">Service Records</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0"/></svg></div>
      <div>
        <div class="stat-val" style="color:${overdueReminders.length ? 'var(--danger)' : 'var(--accent)'}">${reminders.filter(r => r.status !== 'done').length}</div>
        <div class="stat-label">Active Reminders${overdueReminders.length ? ' (' + overdueReminders.length + ' overdue)' : ''}</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" d="M12 6v12m-3-2.818.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/></svg></div>
      <div><div class="stat-val">RM ${totalSpent.toFixed(0)}</div><div class="stat-label">Total Spent</div></div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem;" class="dash-charts">
    <div class="chart-card">
      <div class="card-header" style="margin-bottom:1rem">
        <div class="card-title">Monthly Spending</div>
        <span style="font-size:.75rem;color:var(--muted)">Last 6 months</span>
      </div>
      <div class="chart-wrap"><canvas id="costChart"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="card-header" style="margin-bottom:1rem">
        <div class="card-title">Service Breakdown</div>
        <span style="font-size:.75rem;color:var(--muted)">By type</span>
      </div>
      <div class="chart-wrap"><canvas id="typeChart"></canvas></div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1.5fr 1fr;gap:1.25rem;" class="dash-bottom">
    <div class="card">
      <div class="card-header">
        <div><div class="card-title">Recent Activity</div></div>
        <a href="maintenance.html" class="btn btn-outline btn-sm">View All</a>
      </div>
      ${recentLogs.length ? recentLogs.map(l => {
        const v = MAC.vehicles.get(l.vehicleId);
        return `<div class="activity-item">
          <div class="activity-dot"></div>
          <div>
            <div class="activity-text">${MAC.utils.escapeHtml(l.serviceType)} — <strong style="color:var(--heading)">${v ? MAC.utils.escapeHtml(v.brand + ' ' + v.model) : '?'}</strong></div>
            <div class="activity-meta">${MAC.utils.formatDate(l.serviceDate)} · ${MAC.utils.formatCurrency(l.cost)} · ${MAC.utils.escapeHtml(l.workshopName)}</div>
          </div>
        </div>`;
      }).join('') : '<div style="color:var(--muted);font-size:.875rem;padding:1rem 0">No service records yet. <a href="maintenance.html" style="color:var(--accent)">Add your first one →</a></div>'}
    </div>
    <div class="card">
      <div class="card-header">
        <div><div class="card-title">My Vehicles</div></div>
        <a href="vehicles.html" class="btn btn-outline btn-sm">Manage</a>
      </div>
      ${vehicles.length ? vehicles.map(v => {
        const s = MAC.utils.getVehicleStatus(v.id);
        return `<div style="display:flex;align-items:center;gap:.9rem;padding:.75rem 0;border-bottom:1px solid var(--line)">
          <div style="font-size:1.5rem">${v.type === 'car' ? '🚗' : '🏍️'}</div>
          <div style="flex:1">
            <div style="font-weight:600;color:var(--heading);font-size:.9rem">${MAC.utils.escapeHtml(v.brand)} ${MAC.utils.escapeHtml(v.model)}</div>
            <div style="font-size:.75rem;color:var(--accent)">${MAC.utils.escapeHtml(v.plate)}</div>
          </div>
          <span class="badge badge-${s.cls.replace('status-','')}">${s.label}</span>
        </div>`;
      }).join('') : `<div class="empty-state" style="padding:2rem 1rem">
        <div class="empty-icon">🚗</div>
        <div class="empty-title" style="font-size:.95rem">No vehicles yet</div>
        <a href="vehicles.html" class="btn btn-primary btn-sm" style="margin-top:.75rem">Add Vehicle</a>
      </div>`}
    </div>
  </div>
`;

// Render charts
if (typeof Chart !== 'undefined') {
  Chart.defaults.color = '#8c9e8b';
  Chart.defaults.font.family = "'Urbanist', sans-serif";

  new Chart(document.getElementById('costChart'), {
    type: 'bar',
    data: { labels: months, datasets: [{ data: monthlyCosts, backgroundColor: 'rgba(53,232,87,.18)', borderColor: grn, borderWidth: 2, borderRadius: 6 }] },
    options: { ...chartDefaults, plugins: { ...chartDefaults.plugins } }
  });

  new Chart(document.getElementById('typeChart'), {
    type: 'doughnut',
    data: {
      labels: typeLabels.length ? typeLabels : ['No Data'],
      datasets: [{ data: typeData.length ? typeData : [1], backgroundColor: ['#35e857','#9ffcad','#bbf7d0','#fbbf24','#60a5fa','#f87171'], borderWidth: 0 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '68%',
      plugins: { legend: { display: true, position: 'bottom', labels: { color: '#3d4e3c', font: { size: 11 }, padding: 12, boxWidth: 10 } }, tooltip: chartDefaults.plugins.tooltip }
    }
  });
}

// Responsive chart grid
const mq = window.matchMedia('(max-width: 700px)');
if (mq.matches) {
  document.querySelector('.dash-charts').style.gridTemplateColumns = '1fr';
  document.querySelector('.dash-bottom').style.gridTemplateColumns = '1fr';
}
</script>
</body>
</html>
