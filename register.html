<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Register — MyAutoCare</title>
<link rel="stylesheet" href="app.css"/>
<style>
body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1.5rem; }
.auth-wrap { width: 100%; max-width: 480px; }
.auth-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 2.5rem; justify-content: center; }
.auth-logo .logo-mark { width: 42px; height: 42px; border-radius: 11px; font-size: 20px; }
.auth-logo .logo-text { font-family: var(--fd); font-weight: 800; font-size: 1.3rem; color: var(--white); }
.auth-logo .logo-text em { color: var(--accent); font-style: normal; }
.auth-card { background: var(--g700); border: 1px solid var(--border); border-radius: var(--radius); padding: 2.5rem; }
.auth-title { font-family: var(--fd); font-weight: 800; font-size: 1.6rem; color: var(--white); margin-bottom: .4rem; }
.auth-subtitle { font-size: .9rem; color: var(--muted); margin-bottom: 2rem; }
.auth-link { color: var(--accent); text-decoration: none; font-weight: 600; }
.auth-link:hover { text-decoration: underline; }
</style>
</head>
<body>
<div id="toast-container"></div>
<div class="auth-wrap">
  <div class="auth-logo">
    <div class="logo-mark">M</div>
    <div class="logo-text">My<em>Auto</em>Care</div>
  </div>
  <div class="auth-card">
    <h1 class="auth-title">Create your account</h1>
    <p class="auth-subtitle">Start managing your vehicles for free</p>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" id="name" class="form-control" placeholder="Ahmad Danial"/>
      </div>
      <div class="form-group">
        <label class="form-label">Phone Number</label>
        <input type="tel" id="phone" class="form-control" placeholder="01X-XXXXXXX"/>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" id="email" class="form-control" placeholder="you@example.com"/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••"/>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" id="confirm" class="form-control" placeholder="••••••••"/>
      </div>
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;" id="regBtn">
      Create Account
    </button>
    <p style="text-align:center;font-size:.875rem;color:var(--muted);margin-top:1.25rem">
      Already have an account? <a href="login.html" class="auth-link">Sign in</a>
    </p>
  </div>
</div>
<script src="app-core.js"></script>
<script>
MAC.auth.redirectIfLoggedIn();
document.getElementById('regBtn').addEventListener('click', () => {
  const name = document.getElementById('name').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;
  if (!name || !email || !password) { MAC.utils.toast('Please fill in all required fields', 'error'); return; }
  if (password !== confirm) { MAC.utils.toast('Passwords do not match', 'error'); return; }
  if (password.length < 6) { MAC.utils.toast('Password must be at least 6 characters', 'error'); return; }
  if (MAC.users.find(email)) { MAC.utils.toast('Email already registered', 'error'); return; }
  const user = MAC.users.create({ name, email, password, phone });
  MAC.auth.login(user);
  MAC.utils.toast('Account created! Welcome, ' + name.split(' ')[0] + '!');
  setTimeout(() => window.location.href = 'dashboard.html', 700);
});
</script>
</body>
</html>
