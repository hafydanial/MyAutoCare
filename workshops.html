<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Find Workshops — MyAutoCare</title>
<link rel="stylesheet" href="app.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
#map { height: calc(100vh - 180px); min-height: 500px; border-radius: var(--radius); border: 1px solid var(--border); }
.leaflet-container { background: #0b1a0d; }
.workshop-popup { font-family: 'Urbanist', sans-serif; min-width: 180px; }
.workshop-popup h4 { font-weight: 700; color: #030c04; margin-bottom: .25rem; }
.workshop-popup p { font-size: .8rem; color: #444; margin-bottom: .4rem; }
.workshop-popup a { color: #1a6b2a; font-weight: 600; font-size: .8rem; }
</style>
</head>
<body>
<div id="toast-container"></div>
<div class="app-layout"></div>
<script src="app-core.js"></script>
<script src="layout.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
buildLayout('workshops', 'Find Workshops');

const workshops = [
  { name: "Perodua Service Centre Kuala Lumpur", lat: 3.1478, lng: 101.6953, type: "Authorized", address: "Jalan Ipoh, Kuala Lumpur" },
  { name: "Honda Wings Kepong", lat: 3.2133, lng: 101.6378, type: "Authorized", address: "Kepong, Kuala Lumpur" },
  { name: "Proton Service Centre PJ", lat: 3.1006, lng: 101.6365, type: "Authorized", address: "Petaling Jaya, Selangor" },
  { name: "Toyota Service Centre Cheras", lat: 3.0919, lng: 101.7452, type: "Authorized", address: "Cheras, Kuala Lumpur" },
  { name: "Sime Tyre & Battery Specialist", lat: 3.1290, lng: 101.6845, type: "Independent", address: "Jalan Pudu, Kuala Lumpur" },
  { name: "AutoMech Workshop KL", lat: 3.1520, lng: 101.7200, type: "Independent", address: "Ampang, Kuala Lumpur" },
  { name: "Yamaha Bikes Service Centre", lat: 3.0758, lng: 101.6055, type: "Authorized", address: "Subang Jaya, Selangor" },
  { name: "FastFit Auto Service", lat: 3.1695, lng: 101.7080, type: "Independent", address: "Setapak, Kuala Lumpur" },
  { name: "Bosch Car Service KL Sentral", lat: 3.1337, lng: 101.6873, type: "Independent", address: "KL Sentral, Kuala Lumpur" },
  { name: "Midas Auto Workshop PJ", lat: 3.0965, lng: 101.6478, type: "Independent", address: "Damansara, Petaling Jaya" },
  { name: "BMW Malaysia Service Centre", lat: 3.1583, lng: 101.7136, type: "Authorized", address: "Ampang Hilir, Kuala Lumpur" },
  { name: "Suzuki Bikes Workshop Chow Kit", lat: 3.1665, lng: 101.6966, type: "Authorized", address: "Chow Kit, Kuala Lumpur" },
];

document.getElementById('page-content').innerHTML = `
  <div class="page-header">
    <div>
      <h1 class="page-title">Find Nearby Workshops</h1>
      <p class="page-subtitle">Browse ${workshops.length} workshops in Klang Valley</p>
    </div>
    <button class="btn btn-outline" id="locateBtn">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="15" height="15"><path stroke-linecap="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/><path stroke-linecap="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"/></svg>
      My Location
    </button>
  </div>
  <div style="display:flex;gap:.75rem;margin-bottom:1rem;flex-wrap:wrap">
    <input type="text" id="workshopSearch" class="form-control" placeholder="Search by name or area..." style="max-width:320px" oninput="filterMarkers(this.value)"/>
    <select class="form-select" style="width:auto" id="typeFilter" onchange="filterMarkers(document.getElementById('workshopSearch').value)">
      <option value="">All Types</option>
      <option value="Authorized">Authorized Only</option>
      <option value="Independent">Independent Only</option>
    </select>
  </div>
  <div id="map"></div>
  <p style="font-size:.75rem;color:var(--muted);margin-top:.75rem;text-align:center">Map data © OpenStreetMap contributors · Displayed workshops are representative seed data</p>
`;

// Init Leaflet map centered on KL
const map = L.map('map').setView([3.139, 101.686], 12);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO',
  maxZoom: 19
}).addTo(map);

// Custom marker icons
const authIcon = L.divIcon({
  html: `<div style="width:28px;height:28px;background:#35e857;border:2px solid #9ffcad;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 0 12px rgba(53,232,87,.5)">🔧</div>`,
  className: '', iconAnchor: [14, 14], popupAnchor: [0, -16]
});
const indepIcon = L.divIcon({
  html: `<div style="width:28px;height:28px;background:#60a5fa;border:2px solid #93c5fd;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 0 12px rgba(96,165,250,.4)">🔩</div>`,
  className: '', iconAnchor: [14, 14], popupAnchor: [0, -16]
});

let markers = [];
let userMarker = null;

function addMarkers(list) {
  markers.forEach(m => map.removeLayer(m.marker));
  markers = [];
  list.forEach(w => {
    const icon = w.type === 'Authorized' ? authIcon : indepIcon;
    const m = L.marker([w.lat, w.lng], { icon }).addTo(map);
    m.bindPopup(`
      <div class="workshop-popup">
        <h4>${w.name}</h4>
        <p>📍 ${w.address}</p>
        <p><span style="background:${w.type==='Authorized'?'#d1fae5':'#dbeafe'};color:${w.type==='Authorized'?'#065f46':'#1e40af'};padding:1px 6px;border-radius:99px;font-size:.7rem;font-weight:700">${w.type}</span></p>
        <a href="https://www.google.com/maps?q=${w.lat},${w.lng}" target="_blank">Get Directions →</a>
      </div>
    `);
    markers.push({ marker: m, data: w });
  });
}

function filterMarkers(search) {
  const type = document.getElementById('typeFilter').value;
  const q = search.toLowerCase();
  const filtered = workshops.filter(w =>
    (!q || w.name.toLowerCase().includes(q) || w.address.toLowerCase().includes(q)) &&
    (!type || w.type === type)
  );
  addMarkers(filtered);
}

addMarkers(workshops);

document.getElementById('locateBtn').addEventListener('click', () => {
  if (!navigator.geolocation) { MAC.utils.toast('Geolocation not supported', 'error'); return; }
  navigator.geolocation.getCurrentPosition(pos => {
    const { latitude: lat, longitude: lng } = pos.coords;
    if (userMarker) map.removeLayer(userMarker);
    userMarker = L.marker([lat, lng], {
      icon: L.divIcon({
        html: `<div style="width:20px;height:20px;background:#fbbf24;border:3px solid white;border-radius:50%;box-shadow:0 0 16px rgba(251,191,36,.7)"></div>`,
        className: '', iconAnchor: [10, 10]
      })
    }).addTo(map).bindPopup('📍 You are here').openPopup();
    map.setView([lat, lng], 14);
    MAC.utils.toast('Location found! Showing your position.');
  }, () => MAC.utils.toast('Could not get your location', 'error'));
});
</script>
</body>
</html>
